<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><style>
body { padding: 0; margin: 0; background: #000; overflow: hidden; position: relative; }
canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
.title { position: absolute; left: 22px; top: 18px; color: #fff; font-family: 'Montserrat',sans-serif; font-weight: 300; font-size: 12px; letter-spacing: 0.24em; text-transform: uppercase; z-index: 2; }
.cap { position: absolute; left: 22px; bottom: 16px; color: rgba(255,255,255,0.6); font-family: 'Montserrat',sans-serif; font-weight: 300; font-size: 11px; letter-spacing: 0.06em; z-index: 2; }
</style></head><body>
<canvas id="c"></canvas>
<div class="title">Particle wave · brand background</div>
<div class="cap">stacked sines · mouse-eased camera · the only motion in the brand</div>
<script>
// Lo-fi 2D approximation of the Three.js field for the preview card.
const c = document.getElementById('c');
const ctx = c.getContext('2d');
function fit() { c.width = c.clientWidth * devicePixelRatio; c.height = c.clientHeight * devicePixelRatio; }
fit(); addEventListener('resize', fit);
const AX = 60, AY = 30;
let t = 0;
function frame() {
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle = '#fff';
  const w = c.width, h = c.height;
  for (let ix = 0; ix < AX; ix++) {
    for (let iy = 0; iy < AY; iy++) {
      const nx = ix / (AX - 1), ny = iy / (AY - 1);
      const x = nx * w;
      const baseY = h * 0.5 + (ny - 0.5) * h * 0.8;
      const dy = (Math.sin((ix + t) * 0.3) * 14) + (Math.sin((iy + t) * 0.5) * 14);
      const s = ((Math.sin((ix + t) * 0.3) + 1) * 1.6 + (Math.sin((iy + t) * 0.5) + 1) * 1.6) * devicePixelRatio;
      ctx.beginPath();
      ctx.arc(x, baseY + dy, s * 0.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  t += 0.06;
  requestAnimationFrame(frame);
}
frame();
</script>
</body></html>
