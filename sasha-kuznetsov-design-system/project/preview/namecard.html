<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><style>
body { padding: 0; margin: 0; background: #000; display: grid; place-items: center; min-height: 320px; }
.card {
  background: rgba(255,255,255,0.60); border-radius: 25px;
  padding: 0; text-align: center; min-width: 320px;
}
.card h1 { font-family:'Montserrat',sans-serif; font-weight:300; color:#000; margin:30px 30px 0 30px; font-size:30px; letter-spacing:0; }
.btn {
  display:inline-block; width:240px; padding:19px 20px;
  background:#000; color:#fff; border-radius:3px;
  font-family:'Montserrat',sans-serif; font-weight:300;
  font-size:13px; letter-spacing:1.2px; line-height:1;
  margin:24px 30px 0 30px; text-align:center;
}
.social { display:flex; justify-content:space-between; margin:24px 30px 24px 30px; }
.social img { width:32px; height:32px; }
</style></head><body>
<div class="card">
  <h1>Sasha Kuznetsov</h1>
  <div class="btn">Get in touch</div><br/>
  <div class="btn">Check out my blog</div>
  <div class="social">
    <img src="../assets/icons/social/linkedin.png" />
    <img src="../assets/icons/social/medium.png" />
    <img src="../assets/icons/social/github.png" />
    <img src="../assets/icons/social/twitter.png" />
    <img src="../assets/icons/social/instagram.png" />
  </div>
</div>
</body></html>
