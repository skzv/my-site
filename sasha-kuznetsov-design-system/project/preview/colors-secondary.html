<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><style>
body { padding: 20px; }
.row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.swatch .chip { height: 70px; }
.note { color: var(--fg-muted); font-size: 11px; margin-top: 12px; }
</style></head><body>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#292929"></div><div class="meta"><div class="name">--color-dark</div><div class="hex">#292929</div></div></div>
  <div class="swatch"><div class="chip" style="background:#464646"></div><div class="meta"><div class="name">--color-outline</div><div class="hex">#464646</div></div></div>
  <div class="swatch"><div class="chip" style="background:#a99261"></div><div class="meta"><div class="name">--accent-tan</div><div class="hex">#A99261</div></div></div>
</div>
<p class="note">Supporting greys + a legacy tan. The tan exists in CSS but rarely ships — treat as secondary.</p>
</body></html>
