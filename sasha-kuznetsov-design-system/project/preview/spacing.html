<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><style>
body { padding: 22px; background: #000; }
.row { display: flex; align-items: end; gap: 14px; flex-wrap: wrap; }
.tok { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.tok .box { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); border-radius: 2px; }
.tok .lbl { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 10px; color: rgba(255,255,255,0.7); letter-spacing: 0.04em; }
.note { color: rgba(255,255,255,0.55); font-size: 11px; margin-top: 14px; letter-spacing: 0.04em; }
</style></head><body>
<div class="row">
  <div class="tok"><div class="box" style="width:4px;height:4px"></div><div class="lbl">4</div></div>
  <div class="tok"><div class="box" style="width:8px;height:8px"></div><div class="lbl">8</div></div>
  <div class="tok"><div class="box" style="width:12px;height:12px"></div><div class="lbl">12</div></div>
  <div class="tok"><div class="box" style="width:16px;height:16px"></div><div class="lbl">16</div></div>
  <div class="tok"><div class="box" style="width:20px;height:20px"></div><div class="lbl">20</div></div>
  <div class="tok"><div class="box" style="width:24px;height:24px"></div><div class="lbl">24</div></div>
  <div class="tok"><div class="box" style="width:30px;height:30px;background:rgba(3,175,96,0.45);border-color:rgba(3,175,96,0.6)"></div><div class="lbl">30 ★</div></div>
  <div class="tok"><div class="box" style="width:40px;height:40px"></div><div class="lbl">40</div></div>
  <div class="tok"><div class="box" style="width:60px;height:60px"></div><div class="lbl">60</div></div>
  <div class="tok"><div class="box" style="width:80px;height:80px"></div><div class="lbl">80</div></div>
</div>
<p class="note">30 is the dominant rhythm — card padding, button vertical spacing, button horizontal margin.</p>
</body></html>
