<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><style>
body { padding: 24px; background: #000; }
.row { display: flex; gap: 22px; align-items: center; }
.spec { display: flex; flex-direction: column; gap: 6px; flex: 1; }
.tag { color: rgba(255,255,255,0.5); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; }
.val { color: #fff; font-family: 'Montserrat',sans-serif; font-weight: 300; font-size: 14px; letter-spacing: 0.06em; }
.bar { position: relative; width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
.bar .fill { position: absolute; inset: 0; background: #03af60; transform: translateX(-100%); animation: sweep 1.6s ease-in-out infinite; }
@keyframes sweep { 0% { transform: translateX(-100%); } 60% { transform: translateX(0); } 100% { transform: translateX(100%); } }
.list { display: flex; flex-direction: column; gap: 18px; margin-top: 8px; }
</style></head><body>
<div class="list">
  <div class="row"><div class="spec"><div class="tag">Button color/bg</div><div class="val">600ms · ease</div></div><div class="bar"><div class="fill" style="animation-duration:600ms"></div></div></div>
  <div class="row"><div class="spec"><div class="tag">Glossy sweep</div><div class="val">500ms · ease</div></div><div class="bar"><div class="fill"></div></div></div>
  <div class="row"><div class="spec"><div class="tag">Social icon scale</div><div class="val">~200ms · ease</div></div><div class="bar"><div class="fill" style="animation-duration:200ms"></div></div></div>
  <div class="row"><div class="spec"><div class="tag">Camera lerp / frame</div><div class="val">+5% toward target</div></div><div class="bar"><div class="fill" style="animation-duration:1200ms"></div></div></div>
</div>
</body></html>
