<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><style>
body { padding: 22px; background: #000; }
.specimen { display: grid; gap: 14px; }
.row { display: grid; grid-template-columns: 80px 1fr; align-items: baseline; gap: 16px; }
.tag { font-size: 10px; letter-spacing: 0.18em; color: var(--fg-muted); text-transform: uppercase; font-family: var(--font-mono); }
.sample { color: var(--fg); }
.h1 { font-size: 48px; font-weight: 300; line-height: 1.05; letter-spacing: 0; }
.h2 { font-size: 28px; font-weight: 300; line-height: 1.2; }
.h3 { font-size: 20px; font-weight: 300; }
.body { font-size: 13px; font-weight: 300; line-height: 1.85; color: rgba(255,255,255,0.85); max-width: 480px; }
.eyebrow { font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; font-weight: 300; color: rgba(255,255,255,0.65); }
</style></head><body>
<div class="specimen">
  <div class="row"><span class="tag">H1 · 56</span><span class="sample h1">Sasha Kuznetsov</span></div>
  <div class="row"><span class="tag">H2 · 28</span><span class="sample h2">A quiet section heading</span></div>
  <div class="row"><span class="tag">H3 · 20</span><span class="sample h3">A smaller heading</span></div>
  <div class="row"><span class="tag">Body · 13</span><span class="sample body">Software engineer, physicist, and hacker. Personal site, kept intentionally small.</span></div>
  <div class="row"><span class="tag">Eyebrow</span><span class="sample eyebrow">Software · Physics · Hacking</span></div>
</div>
</body></html>
